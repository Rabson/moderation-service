services:
  gateway-service:
    build:
      context: ./gateway-service
      dockerfile: Dockerfile
    container_name: gateway-service
    cpus: ${GATEWAY_CPUS:-0.50}
    mem_limit: ${GATEWAY_MEM_LIMIT:-512m}
    mem_reservation: ${GATEWAY_MEM_RESERVATION:-256m}
    env_file:
      - .env
    environment:
      GATEWAY_PORT: ${GATEWAY_PORT:-8080}
      UPSTREAM_URL: ${UPSTREAM_URL:-http://api-service:8080}
      GATEWAY_REQUEST_TIMEOUT: ${GATEWAY_REQUEST_TIMEOUT:-130s}
      KEY_CACHE_TTL: ${KEY_CACHE_TTL:-60s}
      ADMIN_SECRET: ${ADMIN_SECRET:-change-me-in-production}
      DATABASE_URL: ${DATABASE_URL:-postgres://moderation:moderation@postgres:5432/moderation?sslmode=disable}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    depends_on:
      api-service:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  api-service:
    build:
      context: ./api-service
      dockerfile: Dockerfile
    container_name: api-service
    cpus: ${API_CPUS:-0.50}
    mem_limit: ${API_MEM_LIMIT:-512m}
    mem_reservation: ${API_MEM_RESERVATION:-256m}
    env_file:
      - .env
    environment:
      API_PORT: ${API_PORT:-8080}
      MODERATION_SERVICE_URL: ${MODERATION_SERVICE_URL:-http://moderation-service:8081}
      API_REQUEST_TIMEOUT: ${API_REQUEST_TIMEOUT:-120s}
      RATE_LIMIT_RPS: ${RATE_LIMIT_RPS:-20}
      RATE_LIMIT_BURST: ${RATE_LIMIT_BURST:-40}
    depends_on:
      moderation-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
