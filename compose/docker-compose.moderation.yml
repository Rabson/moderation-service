services:
  moderation-service:
    build:
      context: ../moderation-service
      dockerfile: Dockerfile
    container_name: moderation-service
    cpus: ${MODERATION_CPUS:-1.00}
    mem_limit: ${MODERATION_MEM_LIMIT:-1g}
    mem_reservation: ${MODERATION_MEM_RESERVATION:-512m}
    env_file:
      - ../.env
    environment:
      MODERATION_PORT: ${MODERATION_PORT:-8081}
      MODERATION_REQUEST_TIMEOUT: ${MODERATION_REQUEST_TIMEOUT:-90s}
      LLM_TIMEOUT: ${LLM_TIMEOUT:-60s}
      CACHE_TTL: ${CACHE_TTL:-10m}
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      POSTGRES_DSN: ${POSTGRES_DSN:-postgres://moderation:moderation@postgres:5432/moderation?sslmode=disable}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma:2b}
      KAFKA_ENABLED: ${KAFKA_ENABLED:-false}
      KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:9092}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-moderation-events}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    cpus: ${OLLAMA_CPUS:-2.00}
    mem_limit: ${OLLAMA_MEM_LIMIT:-6g}
    mem_reservation: ${OLLAMA_MEM_RESERVATION:-4g}
    environment:
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma:2b}
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    entrypoint: ["/bin/sh", "-c"]
    command: ["ollama serve"]
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  ollama-init:
    image: ollama/ollama:latest
    container_name: ollama-init
    cpus: ${OLLAMA_INIT_CPUS:-0.50}
    mem_limit: ${OLLAMA_INIT_MEM_LIMIT:-1g}
    mem_reservation: ${OLLAMA_INIT_MEM_RESERVATION:-512m}
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma:2b}
    entrypoint: ["/bin/sh", "-c"]
    command: ["ollama pull ${OLLAMA_MODEL:-gemma:2b}"]
    restart: "no"
    volumes:
      - ollama-data:/root/.ollama

volumes:
  ollama-data:
