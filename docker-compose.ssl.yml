# OPTIONAL SSL/TLS layer using nginx reverse proxy
# Compose with: docker-compose -f docker-compose.shared.yml -f docker-compose.moderation.yml -f docker-compose.gateway.yml -f docker-compose.ssl.yml up
#
# Requirements:
# 1. Place your SSL certificate at: ./certs/server.crt
# 2. Place your SSL key at: ./certs/server.key
#
# Generate self-signed cert for testing:
#   mkdir -p certs
#   openssl req -x509 -newkey rsa:4096 -keyout certs/server.key -out certs/server.crt -days 365 -nodes \
#     -subj "/CN=localhost"

services:
  nginx:
    image: nginx:alpine
    container_name: nginx-ssl
    env_file:
      - .env
    environment:
      GATEWAY_DOMAIN: ${GATEWAY_DOMAIN:-localhost}
      NGINX_ENVSUBST_TEMPLATE_DIR: /etc/nginx/templates
      NGINX_ENVSUBST_OUTPUT_DIR: /etc/nginx
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./certs:/etc/nginx/certs:ro
      - ./deploy/nginx/nginx.conf.template:/etc/nginx/templates/nginx.conf.template:ro
    depends_on:
      - gateway-service
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  pg-data:
  ollama-data:
