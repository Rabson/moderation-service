services:
  gateway-service:
    build:
      context: ./gateway-service
      dockerfile: Dockerfile
    container_name: gateway-service
    env_file:
      - .env
    environment:
      GATEWAY_PORT: ${GATEWAY_PORT:-8080}
      UPSTREAM_URL: ${UPSTREAM_URL:-http://api-service:8080}
      GATEWAY_REQUEST_TIMEOUT: ${GATEWAY_REQUEST_TIMEOUT:-130s}
      KEY_CACHE_TTL: ${KEY_CACHE_TTL:-60s}
      ADMIN_SECRET: ${ADMIN_SECRET:-change-me-in-production}
      DATABASE_URL: ${DATABASE_URL:-postgres://moderation:moderation@postgres:5432/moderation?sslmode=disable}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    depends_on:
      api-service:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  api-service:
    build:
      context: ./api-service
      dockerfile: Dockerfile
    container_name: api-service
    env_file:
      - .env
    environment:
      API_PORT: ${API_PORT:-8080}
      MODERATION_SERVICE_URL: ${MODERATION_SERVICE_URL:-http://moderation-service:8081}
      API_REQUEST_TIMEOUT: ${API_REQUEST_TIMEOUT:-120s}
      RATE_LIMIT_RPS: ${RATE_LIMIT_RPS:-20}
      RATE_LIMIT_BURST: ${RATE_LIMIT_BURST:-40}
    depends_on:
      moderation-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  moderation-service:
    build:
      context: ./moderation-service
      dockerfile: Dockerfile
    container_name: moderation-service
    env_file:
      - .env
    environment:
      MODERATION_PORT: ${MODERATION_PORT:-8081}
      MODERATION_REQUEST_TIMEOUT: ${MODERATION_REQUEST_TIMEOUT:-90s}
      LLM_TIMEOUT: ${LLM_TIMEOUT:-60s}
      CACHE_TTL: ${CACHE_TTL:-10m}
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      POSTGRES_DSN: ${POSTGRES_DSN:-postgres://moderation:moderation@postgres:5432/moderation?sslmode=disable}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma:2b}
      KAFKA_ENABLED: ${KAFKA_ENABLED:-false}
      KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:9092}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-moderation-events}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    environment:
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma:2b}
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    entrypoint: ["/bin/sh", "-c"]
    command: ["ollama serve"]
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  ollama-init:
    image: ollama/ollama:latest
    container_name: ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma:2b}
    entrypoint: ["/bin/sh", "-c"]
    command: ["ollama pull ${OLLAMA_MODEL:-gemma:2b}"]
    restart: "no"
    volumes:
      - ollama-data:/root/.ollama

  redis:
    image: redis:7-alpine
    container_name: redis
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: moderation
      POSTGRES_PASSWORD: moderation
      POSTGRES_DB: moderation
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./deploy/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moderation -d moderation"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: bitnami/zookeeper:3.9
    container_name: zookeeper
    profiles: ["kafka"]
    environment:
      ALLOW_ANONYMOUS_LOGIN: "yes"
    ports:
      - "2181:2181"

  kafka:
    image: bitnami/kafka:3.7
    container_name: kafka
    profiles: ["kafka"]
    depends_on:
      - zookeeper
    environment:
      KAFKA_CFG_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      ALLOW_PLAINTEXT_LISTENER: "yes"
    ports:
      - "9092:9092"

volumes:
  ollama-data:
  pg-data:
